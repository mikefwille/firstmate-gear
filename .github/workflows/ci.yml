name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Lint
        run: uv run ruff check .
      - name: Tests
        run: uv run pytest -q
      - name: Package builds
        run: uv build
      - name: Entry points resolve
        run: |
          uv run fm-status --help
          uv run fm-read --help
